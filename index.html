<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LETSARA - Uruguaiana</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #1F3066;
        }
        #carrossel {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .slide {
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            width: 100%;
            height: 100%;
        }
        .slide.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="carrossel">
        <div class="slide warnings-long active">
            <img src="Envio.png" alt="Imagem 1" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="slide warnings-long">
            <img src="Carimbo1.png" alt="Imagem 2" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="slide warnings-long">
            <img src="Carimbo2.png" alt="Imagem 3" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="slide warnings-long">
            <img src="ComunicadoPallets.jpeg" alt="Imagem 4" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="slide warnings-long">
            <img src="Opiniao.png" alt="Imagem 5" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
                <div class="slide warnings-short">
            <img src="1.jpeg" alt="Imagem 6" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
                <div class="slide warnings-short">
            <img src="2.jpeg" alt="Imagem 7" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
                <div class="slide warnings-short">
            <img src="3.jpeg" alt="Imagem 8" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
                <div class="slide warnings-short">
            <img src="4.jpeg" alt="Imagem 9" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
                <div class="slide warnings-short">
            <img src="5.jpeg" alt="Imagem 10" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
                <div class="slide warnings-short">
            <img src="6.jpeg" alt="Imagem 11" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
    </div>

    <script>
    const groups = [
        { slides: document.querySelectorAll('.warnings-long'), duration: 20000 },
        { slides: document.querySelectorAll('.warnings-short'), duration: 10000 }
    ];

    let currentGroupIndex = 0;
    let currentSlideIndex = 0;
    let timer;

    function showSlide(groupIndex, slideIndex) {
        document.querySelectorAll('.slide').forEach((slide) => slide.classList.remove('active'));
        groups[groupIndex].slides[slideIndex].classList.add('active');
    }

    function scheduleNext() {
        clearTimeout(timer);
        timer = setTimeout(nextSlide, groups[currentGroupIndex].duration);
    }

    function nextSlide() {
        const currentGroup = groups[currentGroupIndex];
        currentSlideIndex++;

        if (currentSlideIndex >= currentGroup.slides.length) {
            currentGroupIndex = (currentGroupIndex + 1) % groups.length;
            currentSlideIndex = 0;
        }

        showSlide(currentGroupIndex, currentSlideIndex);
        scheduleNext();
    }

    function prevSlide() {
        currentSlideIndex--;

        if (currentSlideIndex < 0) {
            currentGroupIndex = (currentGroupIndex - 1 + groups.length) % groups.length;
            const newGroup = groups[currentGroupIndex];
            currentSlideIndex = newGroup.slides.length - 1;
        }

        showSlide(currentGroupIndex, currentSlideIndex);
        scheduleNext();
    }

    showSlide(currentGroupIndex, currentSlideIndex);
    scheduleNext();


    const carousel = document.getElementById("carrossel");

    let startX = 0;
    let endX = 0;

    function handleGesture() {
        const threshold = 50; // minimum drag distance

        if (endX < startX - threshold) {
            nextSlide(); // swipe left
        }

        if (endX > startX + threshold) {
            prevSlide(); // swipe right
        }
    }

    // Touch events
    carousel.addEventListener("touchstart", (e) => {
        startX = e.touches[0].clientX;
    });

    carousel.addEventListener("touchend", (e) => {
        endX = e.changedTouches[0].clientX;
        handleGesture();
    });

    // Mouse drag events
    carousel.addEventListener("mousedown", (e) => {
        startX = e.clientX;
    });

    carousel.addEventListener("mouseup", (e) => {
        endX = e.clientX;
        handleGesture();
    });
</script>

</body>
</html>
