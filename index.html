<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LETSARA - Uruguaiana</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #1F3066;
        }
        #carrossel {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: pan-y;
            cursor: grab;
        }
        .slide {
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            width: 100%;
            height: 100%;
        }
        .slide.active {
            opacity: 1;
        }
        #carrossel.dragging {
            cursor: grabbing;
        }
        .media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="carrossel">
        <div class="slide warnings-long active">
            <img class="media" src="Envio.png" alt="Imagem 1">
        </div>
        <div class="slide warnings-long">
            <img class="media" src="Carimbo1.png" alt="Imagem 2">
        </div>
        <div class="slide warnings-long">
            <img class="media" src="Carimbo2.png" alt="Imagem 3">
        </div>
        <div class="slide warnings-long">
            <img class="media" src="ComunicadoPallets.jpeg" alt="Imagem 5">
        </div>
        <div class="slide warnings-short">
            <img class="media" src="1.jpeg" alt="Imagem 6">
        </div>
        <div class="slide warnings-short">
            <img class="media" src="2.jpeg" alt="Imagem 7">
        </div>
        <div class="slide warnings-short">
            <img class="media" src="3.jpeg" alt="Imagem 8">
        </div>
        <div class="slide warnings-short">
            <img class="media" src="4.jpeg" alt="Imagem 9">
        </div>
        <div class="slide warnings-short">
            <img class="media" src="5.jpeg" alt="Imagem 10">
        </div>
        <div class="slide warnings-short">
            <img class="media" src="6.jpeg" alt="Imagem 11">
        </div>
        <div class="slide warnings-video">
            <video class="media" src="IPTELL.mp4" muted playsinline preload="metadata"></video>
        </div>
    </div>

    <script>
        const carousel = document.getElementById('carrossel');
        const slides = Array.from(document.querySelectorAll('.slide'));
        const imageDurations = {
            'warnings-long': 20000,
            'warnings-short': 10000
        };

        let currentSlideIndex = 0;
        let autoAdvanceTimer = null;
        let pointerStartX = 0;
        let pointerActive = false;

        function clearAutoAdvance() {
            if (autoAdvanceTimer) {
                clearTimeout(autoAdvanceTimer);
                autoAdvanceTimer = null;
            }
        }

        function stopAllVideos() {
            slides.forEach((slide) => {
                const video = slide.querySelector('video');
                if (!video) {
                    return;
                }

                video.pause();
                video.currentTime = 0;
                video.onended = null;
            });
        }

        function scheduleNextSlide() {
            clearAutoAdvance();

            const currentSlide = slides[currentSlideIndex];
            const video = currentSlide.querySelector('video');

            if (video) {
                video.muted = true;
                video.playbackRate = 1.25;
                video.loop = false;
                video.currentTime = 0;
                video.onended = () => {
                    video.pause();
                    video.currentTime = 0;
                    goToSlide(currentSlideIndex + 1);
                };

                const playPromise = video.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => {
                        autoAdvanceTimer = setTimeout(() => goToSlide(currentSlideIndex + 1), 1000);
                    });
                }
                return;
            }

            const durationClass = Object.keys(imageDurations).find((className) => currentSlide.classList.contains(className));
            const duration = imageDurations[durationClass] ?? 10000;
            autoAdvanceTimer = setTimeout(() => goToSlide(currentSlideIndex + 1), duration);
        }

        function goToSlide(index) {
            clearAutoAdvance();
            stopAllVideos();

            currentSlideIndex = (index + slides.length) % slides.length;

            slides.forEach((slide, slideIndex) => {
                slide.classList.toggle('active', slideIndex === currentSlideIndex);
            });

            scheduleNextSlide();
        }

        function handlePointerDown(event) {
            pointerActive = true;
            pointerStartX = event.clientX;
            carousel.classList.add('dragging');
            carousel.setPointerCapture(event.pointerId);
        }

        function handlePointerUp(event) {
            if (!pointerActive) {
                return;
            }

            const deltaX = event.clientX - pointerStartX;
            pointerActive = false;
            carousel.classList.remove('dragging');
            carousel.releasePointerCapture(event.pointerId);

            if (Math.abs(deltaX) < 50) {
                return;
            }

            if (deltaX < 0) {
                goToSlide(currentSlideIndex + 1);
                return;
            }

            goToSlide(currentSlideIndex - 1);
        }

        function handlePointerCancel() {
            pointerActive = false;
            carousel.classList.remove('dragging');
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearAutoAdvance();
                stopAllVideos();
                return;
            }

            goToSlide(currentSlideIndex);
        });

        carousel.addEventListener('pointerdown', handlePointerDown);
        carousel.addEventListener('pointerup', handlePointerUp);
        carousel.addEventListener('pointerleave', handlePointerCancel);
        carousel.addEventListener('pointercancel', handlePointerCancel);

        goToSlide(0);
    </script>

</body>
</html>
